name: APK AzurLane Elaina Build Work
on:
  workflow_dispatch:
    inputs:
      server_name:
        description: '区服名称-必须（必须是英文字母！例如 Bilibili，台服和外服请使用XAPK AzurLane JMBQ Build Work）'
        required: true
        type: string
        default: ''
      download_url:
        description: 'APK下载链接（只能填入直链，最好使用国外云盘的直链，例如Google云盘）'
        required: true
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 步骤1：检出仓库代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 步骤2：设置 Java JDK
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: "18"
          distribution: "adopt"

      # 步骤3：设置 Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # 步骤4：安装 build-tools
      - name: Install build-tools
        run: |
          yes | sdkmanager --install "build-tools;35.0.0"
      
      # 步骤5：执行构建流程
      - name: Build APK
        run: |
          chmod +x merge_build.sh
          ./merge_build.sh "${{ github.event.inputs.server_name }}" "${{ github.event.inputs.download_url }}"

      # 步骤6: 动态拼接 Release 简介
      - name: Generate Release Notes
        run: |
          cp RELEASE_NOTES.md current_release.md
          
          echo "" >> current_release.md
          echo "### 📦 本次构建动态信息" >> current_release.md
          
      # 步骤7：创建 Release 并上传所有分卷文件
      - name: Release and Upload Assets
        uses: ncipollo/release-action@v1
        with:
          tag: "${{ env.ELAINA_VERSION }}-APK"
          name: "AzurLane Elaina ${{ env.ELAINA_VERSION }} Build APK"
          artifacts: "${{ github.event.inputs.server_name }}.7z.*"
          allowUpdates: true
          bodyFile: "current_release.md"
